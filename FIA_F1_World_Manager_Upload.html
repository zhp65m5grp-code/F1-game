<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIA F1 World Manager</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:15px}
button,input,select{padding:10px;margin:5px}
.card{background:#222;padding:12px;margin:10px auto;border-radius:12px;max-width:420px}
h1{color:#fff}
</style>
</head>
<body>

<h1>🏁 FIA F1 World Manager</h1>
<p>You are the FIA. Control the entire championship.</p>

<div class="card">
<h2>📜 Regulations</h2>
<select id="category">
<option>Open Championship</option>
<option>Men's Championship</option>
<option>Women's Championship</option>
</select>

<select id="rule">
<option>Budget Cap</option>
<option>Aero Regulations</option>
<option>Engine Rules</option>
<option>Safety Rules</option>
</select>

<button onclick="addRule()">Approve Rule</button>
</div>

<div class="card">
<h2>🏎 Approve Team</h2>
<input id="team" placeholder="Team name">
<button onclick="addTeam()">Approve Team</button>
</div>

<div class="card">
<h2>👤 Register Driver</h2>
<input id="driver" placeholder="Driver name">
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Non-binary</option>
</select>
<button onclick="addDriver()">Approve Driver</button>
</div>

<button onclick="race()">🏆 Run Grand Prix</button>

<h2 id="msg"></h2>
<div id="display"></div>

<script>
let fia={
race:0,
rules:[],
teams:[],
drivers:[]
};

function addRule(){
fia.rules.push(category.value+" - "+rule.value);
msg.innerHTML="FIA regulation approved";
show();
}

function addTeam(){
if(team.value){
fia.teams.push(team.value);
msg.innerHTML="Team approved";
show();
}
}

function addDriver(){
if(driver.value){
fia.drivers.push({
name:driver.value,
gender:gender.value,
points:0
});
msg.innerHTML="Driver approved";
show();
}
}

function changeGender(i){
let options=["Male","Female","Non-binary"];
let d=fia.drivers[i];
d.gender=options[(options.indexOf(d.gender)+1)%3];
show();
}

function race(){
fia.race++;
fia.drivers.sort(()=>Math.random()-0.5);
fia.drivers.forEach((d,i)=>{
d.points += [25,18,15,12,10][i]||0;
});
msg.innerHTML="🏁 Grand Prix finished";
show();
}

function show(){
let x="<div class='card'><b>📜 Rules</b><br>"+fia.rules.join("<br>")+"</div>";
x+="<div class='card'><b>🏎 Teams</b><br>"+fia.teams.join("<br>")+"</div>";
x+="<div class='card'><b>👤 Drivers</b><br>";
fia.drivers.forEach((d,i)=>{
x+=d.name+" | "+d.gender+" | "+d.points+" pts ";
x+="<button onclick='changeGender("+i+")'>Change Gender</button><br>";
});
x+="</div>";
x+="<div class='card'>Grand Prix: "+fia.race+"</div>";
display.innerHTML=x;
}
show();
</script>

</body>
</html>
